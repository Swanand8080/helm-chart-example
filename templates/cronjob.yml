{{- if .Values.cronJob.enabled -}}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ printf "%s-cronjob" .Release.Name }}
  labels:
    app.kubernetes.io/name: {{ printf "%s-cronjob" .Release.Name }}
spec:
  schedule: {{ .Values.cronJob.schedule | quote }}
  timeZone: {{ .Values.cronJob.timeZone | default "Asia/Kolkata" | quote }}
  suspend: {{ .Values.cronJob.suspend | default false }}
  concurrencyPolicy: {{ .Values.cronJob.concurrencyPolicy | default "Forbid" }}
  successfulJobsHistoryLimit: {{ .Values.cronJob.successfulJobsHistoryLimit | default 3 }}
  failedJobsHistoryLimit: {{ .Values.cronJob.failedJobsHistoryLimit | default 3 }}
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.cronJob.backoffLimit | default 2 }}
      template:
        metadata:
          labels:
            app.kubernetes.io/name: {{ printf "%s-cronjob" .Release.Name }}
        spec:
          restartPolicy: {{ .Values.cronJob.restartPolicy | default "OnFailure" }}
          containers:
          - name: {{ .Chart.Name }}
            image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
            {{- if .Values.cronJob.command }}
            command:
              {{- toYaml .Values.cronJob.command | nindent 14 }}
            {{- end }}
            {{- if .Values.cronJob.args }}
            args:
              {{- toYaml .Values.cronJob.args | nindent 14 }}
            {{- end }}
            env:
              - name: TZ
                value: {{ .Values.timezone | default "Asia/Kolkata" | quote }}
              {{- if .Values.extraEnv }}
              {{- toYaml .Values.extraEnv | nindent 14 }}
              {{- end }}
{{- end }}
