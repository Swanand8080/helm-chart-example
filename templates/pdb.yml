apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ printf "%s-pdb" .Release.Name }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable | default "50%" }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Release.Name }}
